<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nosotros | AXIS WEAR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="nosotros.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<header class="header">
    <div class="logo">AXIS WEAR</div>
    <nav class="nav">
        <div class="dropdown">
            <a href="index.html">Inicio</a>
        </div>

        <div class="dropdown">
            <a href="#">Tienda</a>
        </div>

        <div class="dropdown">
            <a href="#">Colección</a>
        </div>

        <div class="dropdown">
            <a href="nosotros.html">Nosotros</a>
        </div>
    </nav>
</header>

<section class="about-hero">
    <div class="about-overlay">
        <h1 class="hero-title">
            SOBRE AXIS WEAR
        </h1>
        <p>Moda urbana creada para quienes expresan
            su identidad a través del estilo.</p>
    </div>
</section>

<section class="about-content-page">
    <div class="about-text">
        <h2>Nuestra historia</h2>
        <p>AXIS WEAR nace de la inspiración de la cultura streetwear y la moda contemporánea.</p>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://unpkg.com/split-type"></script>

<!-- Aniamcion ouyeahhh -->
<script>
const text = new SplitType('.hero-title', {
    types: "words, chars"
});

text.chars.forEach((char, index) => {

    let charsTl = gsap.timeline();
    charsTl.from(char, {
        y: gsap.utils.random(-150, 150),
        x: gsap.utils.random(-300, 300),
        rotate: gsap.utils.random(-360, 360),
        scale: gsap.utils.random(0, 2),
        opacity: 0,
        duration: .75,
        ease: "back.out",
        delay: index * 0.02
    });

    charsTl.from(char, {
        color: `rgb(
            ${gsap.utils.random(0,255)},
            ${gsap.utils.random(0,255)},
            ${gsap.utils.random(0,255)}
        )`,
        duration: 1

    }, "-=.25");

    char.addEventListener("mouseenter", charsHover);

    let charOriginalColor =
    window.getComputedStyle(char).color;

    function charsHover() {
        gsap.timeline()
        .to(char, {
            y: gsap.utils.random(-50, 50),
            x: gsap.utils.random(-50, 50),
            rotate: gsap.utils.random(-90, 90),
            scale: gsap.utils.random(0.5, 1.5),
            duration: .5,

            ease: "back.out",

            color: `rgb(
                ${gsap.utils.random(0,255)},
                ${gsap.utils.random(0,255)},
                ${gsap.utils.random(0,255)}
            )`,

            onStart: () => {
                char.removeEventListener(
                    "mouseenter",
                    charsHover
                );
            }
        })

        .to(char, {
            y: 0,
            x: 0,
            rotate: 0,
            scale: 1,
            color: charOriginalColor,
            delay: 1,
            duration: .5,
            ease: "back.out",
            onComplete: () => {
                setTimeout(() => {
                    char.addEventListener(
                        "mouseenter",
                        charsHover
                    );

                }, 100);
            }
        });
    }
});
</script>

</body>
</html>
